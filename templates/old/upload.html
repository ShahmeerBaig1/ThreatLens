<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ThreatLens | Analyze Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100">

<!-- Navbar -->
<nav class="border-b border-slate-800 bg-slate-900 px-6 py-4">
    <a href="/" class="text-xl font-bold text-indigo-400">ThreatLens</a>
</nav>

<!-- Upload Section -->
<section class="relative min-h-[90vh] flex items-center justify-center px-6">

    <!-- Animated Glow Lines -->
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/20 via-purple-600/10 to-transparent blur-3xl"></div>

    <form action="/results" method="POST" enctype="multipart/form-data"
          class="relative z-10 bg-slate-900 border border-slate-800 rounded-2xl p-10 max-w-xl w-full shadow-xl">

        <h1 class="text-3xl font-bold mb-4">
            Upload Log File
        </h1>

        <p class="text-slate-400 mb-8">
            Upload server, authentication, or access logs to detect suspicious activity.
        </p>

        <!-- Drop Area -->
        <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-indigo-500/50 rounded-xl cursor-pointer hover:border-indigo-500 transition">
            <div class="flex flex-col items-center">
                <svg class="w-10 h-10 text-indigo-400 mb-4" fill="none" stroke="currentColor" stroke-width="1.5"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 16v-8m0 0l-3 3m3-3l3 3M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1"/>
                </svg>

                <p class="text-sm text-slate-400">
                    Click to upload or drag & drop
                </p>
                <p class="text-xs text-slate-500 mt-1">
                    .log files supported
                </p>
            </div>

            <input type="file" name="logfile" class="hidden" required>
        </label>

        <!-- Button -->
        <button type="submit"
                class="mt-8 w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 transition font-semibold">
            Analyze Log File
        </button>
    </form>

</section>

</body>
</html>
