<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ThreatLens | Analyze Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slide-up   { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:.4} }
        @keyframes scan-y     { 0%{top:-10%} 100%{top:110%} }
        @keyframes bounce-in  { 0%{transform:scale(.7);opacity:0} 65%{transform:scale(1.07);opacity:1} 100%{transform:scale(1)} }
        @keyframes shimmer    { 0%{background-position:-500px 0} 100%{background-position:500px 0} }
        @keyframes float-msg  { 0%{opacity:0;transform:translateY(8px)} 15%{opacity:1;transform:translateY(0)} 80%{opacity:1} 100%{opacity:0;transform:translateY(-8px)} }

        .grid-bg {
            background-image:
                linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
                linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
            background-size:50px 50px;
        }

        .drop-zone { transition: all .35s cubic-bezier(.34,1.56,.64,1); }
        .drop-zone.has-file {
            border-color: rgba(99,102,241,.65);
            background: rgba(99,102,241,.05);
        }
        .drop-zone.drag-over {
            border-color: rgba(139,92,246,.9);
            background: rgba(139,92,246,.1);
            transform: scale(1.025);
            box-shadow: 0 0 40px rgba(99,102,241,.2);
        }

        .scanner-beam {
            position:absolute; left:0; right:0; height:2px; pointer-events:none; display:none;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,.9), transparent);
            animation: scan-y 2s linear infinite;
        }
        .drop-zone.has-file .scanner-beam { display:block; }

        .upload-btn { position:relative; overflow:hidden; transition: all .3s cubic-bezier(.34,1.56,.64,1); }
        .upload-btn::after {
            content:''; position:absolute; inset:0;
            background: linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
            transform:translateX(-100%); transition:transform .5s;
        }
        .upload-btn:not(:disabled):hover::after { transform:translateX(100%); }
        .upload-btn:not(:disabled):active { transform:scale(.97); }

        .shimmer-bar {
            background: linear-gradient(90deg, rgba(99,102,241,.15) 25%, rgba(99,102,241,.45) 50%, rgba(99,102,241,.15) 75%);
            background-size: 500px 100%; animation: shimmer 1.3s linear infinite;
        }

        .enter-1 { animation: slide-up .6s .1s ease-out both; }
        .enter-2 { animation: slide-up .6s .22s ease-out both; }
        .enter-3 { animation: slide-up .6s .36s ease-out both; }

        .status-line { animation: float-msg 5s ease-in-out forwards; }
        .pulse-dot { width:7px; height:7px; border-radius:50%; display:inline-block; animation: pulse-glow 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 grid-bg min-h-screen">

<nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-xl px-6 py-4 sticky top-0 z-50">
    <a href="/" class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent tracking-tight">ThreatLens</a>
</nav>

<div class="fixed inset-0 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 via-purple-600/5 to-transparent blur-3xl"></div>
</div>

<section class="relative min-h-[90vh] flex items-center justify-center px-6">
    <form id="uploadForm" action="/results" method="POST" enctype="multipart/form-data"
          class="relative z-10 bg-slate-900 border border-slate-800 rounded-2xl p-10 max-w-xl w-full shadow-2xl shadow-black/50">

        <!-- Header -->
        <div class="enter-1 mb-8">
            <div class="flex items-center gap-2 mb-3">
                <span class="pulse-dot bg-green-400"></span>
                <span class="text-xs text-slate-400 uppercase tracking-widest font-medium">Detection Engine Active</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Upload Log File</h1>
            <p class="text-slate-400 mt-2 text-sm leading-relaxed">
                Upload server, authentication, or access logs to detect suspicious activity, brute-force patterns, and injection attempts.
            </p>
        </div>

        <!-- Drop Zone -->
        <div class="enter-2">
            <label id="dropZone"
                   class="drop-zone relative flex flex-col items-center justify-center w-full h-52 border-2 border-dashed border-slate-600 rounded-xl cursor-pointer overflow-hidden hover:border-slate-500 transition-colors">

                <div class="scanner-beam"></div>

                <!-- Empty state -->
                <div id="stateEmpty" class="flex flex-col items-center transition-all duration-300">
                    <div id="uploadIconWrap" class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4 transition-all duration-300">
                        <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-8m0 0l-3 3m3-3l3 3M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1"/>
                        </svg>
                    </div>
                    <p class="text-sm text-slate-400 font-medium">Click to upload or drag & drop</p>
                    <p class="text-xs text-slate-500 mt-1">.log · .txt · any plain-text format</p>
                </div>

                <!-- File selected state -->
                <div id="stateFile" class="hidden flex-col items-center">
                    <div class="w-16 h-16 bg-indigo-500/15 border border-indigo-500/40 rounded-2xl flex items-center justify-center mb-4"
                         style="animation:bounce-in .5s ease-out">
                        <svg class="w-7 h-7 text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <p id="fileName" class="text-sm text-indigo-300 font-semibold font-mono max-w-xs truncate text-center px-4"></p>
                    <p id="fileSize" class="text-xs text-slate-500 mt-1"></p>
                    <p class="text-xs text-indigo-400/60 mt-2">✓ Ready · click to change file</p>
                </div>

                <input type="file" name="logfile" id="fileInput" class="hidden" required>
            </label>

            <!-- File meta chip -->
            <div id="fileMeta" class="hidden mt-3 flex items-center gap-2.5 px-4 py-2.5 bg-slate-800/60 border border-slate-700/50 rounded-lg"
                 style="animation:slide-up .4s ease-out">
                <span class="pulse-dot bg-indigo-400"></span>
                <span id="fileMetaText" class="text-xs text-slate-300 font-mono"></span>
            </div>
        </div>

        <!-- Submit button -->
        <div class="enter-3 mt-8 space-y-4">
            <button type="submit" id="submitBtn" disabled
                    class="upload-btn w-full py-3.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 font-semibold text-base tracking-wide shadow-lg shadow-indigo-500/20 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                <span id="btnContent" class="flex items-center justify-center gap-2">
                    <svg class="w-4 h-4 opacity-60" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6z"/>
                    </svg>
                    Select a File First
                </span>
            </button>

            <!-- Progress bar -->
            <div id="progressWrap" class="hidden" style="animation:slide-up .4s ease-out">
                <div class="flex justify-between text-xs text-slate-500 mb-2">
                    <span id="progressLabel" class="transition-all duration-300">Initializing...</span>
                    <span id="progressPct" class="font-mono">0%</span>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full shimmer-bar rounded-full transition-all duration-200" style="width:0%"></div>
                </div>
            </div>

            <!-- Status messages stream -->
            <div id="statusStream" class="space-y-1 min-h-[20px]"></div>
        </div>

    </form>
</section>

<script>
const dropZone     = document.getElementById('dropZone');
const fileInput    = document.getElementById('fileInput');
const stateEmpty   = document.getElementById('stateEmpty');
const stateFile    = document.getElementById('stateFile');
const fileMeta     = document.getElementById('fileMeta');
const fileMetaText = document.getElementById('fileMetaText');
const submitBtn    = document.getElementById('submitBtn');
const btnContent   = document.getElementById('btnContent');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const progressPct  = document.getElementById('progressPct');
const progressLabel= document.getElementById('progressLabel');
const statusStream = document.getElementById('statusStream');

// Drag handlers
['dragenter','dragover'].forEach(e =>
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag-over'); }));
['dragleave','drop'].forEach(e =>
    dropZone.addEventListener(e, ev => {
        ev.preventDefault(); dropZone.classList.remove('drag-over');
        if (e === 'drop' && ev.dataTransfer.files[0]) {
            fileInput.files = ev.dataTransfer.files;
            handleFile(ev.dataTransfer.files[0]);
        }
    }));

fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(2) + ' MB';
}

function handleFile(file) {
    stateEmpty.classList.add('hidden');
    stateFile.classList.remove('hidden');
    stateFile.style.display = 'flex';
    dropZone.classList.add('has-file');

    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = fmtSize(file.size);

    fileMetaText.textContent = `${file.name}  ·  ${fmtSize(file.size)}  ·  queued`;
    fileMeta.classList.remove('hidden');

    submitBtn.disabled = false;
    btnContent.innerHTML = `
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Analyze Log File`;

    pushStatus(`📁 ${file.name} detected`, 'text-indigo-300');
    setTimeout(() => pushStatus(`📊 ${fmtSize(file.size)} ready for analysis`, 'text-slate-400'), 400);
}

function pushStatus(msg, cls = 'text-slate-400') {
    const el = document.createElement('p');
    el.className = `text-xs ${cls} status-line font-mono`;
    el.textContent = msg;
    statusStream.appendChild(el);
    setTimeout(() => el.remove(), 5500);
}

// Upload sequence messages
const uploadMsgs = [
    'Establishing secure channel...',
    'Streaming log bytes to engine...',
    'Detecting log format...',
    'Running signature matching...',
    'Scoring threat patterns...',
    'Correlating IP reputation...',
    'Building threat timeline...',
    'Finalizing report...',
];

document.getElementById('uploadForm').addEventListener('submit', function() {
    if (!fileInput.files.length) return;

    submitBtn.disabled = true;
    btnContent.innerHTML = `
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Analyzing...`;

    progressWrap.classList.remove('hidden');
    statusStream.innerHTML = '';

    let pct = 0, msgIdx = 0;
    const step = () => {
        const inc = pct < 55 ? 2.5 : pct < 78 ? 1.2 : pct < 87 ? 0.4 : 0;
        pct = Math.min(pct + inc, 88);
        progressBar.style.width = pct + '%';
        progressPct.textContent = Math.round(pct) + '%';

        if (msgIdx < uploadMsgs.length && pct > msgIdx * 11) {
            progressLabel.textContent = uploadMsgs[msgIdx];
            pushStatus('› ' + uploadMsgs[msgIdx], 'text-slate-500');
            msgIdx++;
        }
    };
    const iv = setInterval(step, 130);
    window.addEventListener('beforeunload', () => clearInterval(iv));
});
</script>
</body>
</html>
